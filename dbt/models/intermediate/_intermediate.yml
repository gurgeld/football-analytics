version: 2

models:
  - name: int_match_events
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['GOAL', 'BOOKING', 'SUBSTITUTION']
      - name: match_id
        tests:
          - not_null

  - name: int_competition_seasons
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - competition_id
            - season_year
    columns:
      - name: competition_id
        tests:
          - not_null
      - name: season_year
        tests:
          - not_null
