version: 2

models:
  # Dimensions
  - name: dim_areas
    columns:
      - name: area_id
        tests:
          - unique
          - not_null

  - name: dim_competitions
    columns:
      - name: competition_id
        tests:
          - unique
          - not_null

  - name: dim_teams
    columns:
      - name: team_id
        tests:
          - unique
          - not_null

  - name: dim_persons
    columns:
      - name: person_id
        tests:
          - unique
          - not_null

  - name: dim_seasons
    columns:
      - name: season_key
        tests:
          - unique
          - not_null
      - name: competition_id
        tests:
          - not_null
      - name: season_year
        tests:
          - not_null

  # Facts
  - name: fct_matches
    columns:
      - name: match_id
        tests:
          - unique
          - not_null
      - name: competition_id
        tests:
          - not_null
      - name: home_team_id
        description: "Pode ser nulo em partidas eliminatórias futuras onde os times ainda não foram definidos"
      - name: away_team_id
        description: "Pode ser nulo em partidas eliminatórias futuras onde os times ainda não foram definidos"
      - name: status
        tests:
          - accepted_values:
              values: ['SCHEDULED', 'LIVE', 'IN_PLAY', 'PAUSED', 'FINISHED', 'POSTPONED', 'SUSPENDED', 'CANCELLED', 'AWARDED', 'TIMED']
      - name: stage
        tests:
          - accepted_values:
              values: ['GROUP_STAGE', 'LAST_16', 'QUARTER_FINALS', 'SEMI_FINALS', 'THIRD_PLACE', 'FINAL', 'REGULAR_SEASON', 'PLAYOFFS', 'LEAGUE_STAGE', 'LAST_32']
      - name: winner
        tests:
          - accepted_values:
              values: ['HOME_TEAM', 'AWAY_TEAM', 'DRAW']

  - name: fct_standings
    columns:
      - name: standing_id
        tests:
          - unique
          - not_null
      - name: competition_id
        tests:
          - not_null
      - name: season_year
        tests:
          - not_null
      - name: team_id
        tests:
          - not_null
      - name: type
        tests:
          - not_null
          - accepted_values:
              values: ['TOTAL', 'HOME', 'AWAY']

  - name: fct_top_scorers
    columns:
      - name: scorer_id
        tests:
          - unique
          - not_null
      - name: competition_id
        tests:
          - not_null
      - name: season_year
        tests:
          - not_null
      - name: person_id
        tests:
          - not_null

  - name: fct_match_events
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: match_id
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['GOAL', 'BOOKING', 'SUBSTITUTION']
